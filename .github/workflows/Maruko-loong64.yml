name: Maruko-loong64

on:
  workflow_dispatch:

jobs:
  build:
    name: 编译构建 (loong64)
    runs-on: ubuntu-24.04

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 QEMU（loong64 模拟）
      uses: docker/setup-qemu-action@v3

    - name: 在 deepin-loong64 容器中编译
      run: |
        docker run --platform linux/loong64 \
          -v "${{ github.workspace }}:/workspace" \
          -w /workspace \
          linuxdeepin/deepin:crimson-loong64 \
          bash -c '
            set -e

            apt update
            apt install -y \
              python3-dev \
              python3-pip \
              python3-tk \
              tk8.6-dev \
              tcl8.6-dev \
              patchelf

            pip3 config set global.index-url https://mirrors.loong64.com/pypi/simple
            pip3 install nuitka==4.0.8 urllib3 tkinterdnd2 --break-system-packages

            python -m nuitka --onefile --standalone --windows-console-mode=disable --show-progress --lto=yes --jobs=4 --enable-plugins=tk-inter --include-module=math --follow-imports --include-data-file='./hooks/pre_find_module_path/hook-tkinter.py'='./hooks/pre_find_module_path/hook-tkinter.py' ./main.py
          '

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: Maruko-loong64
        path: ./
