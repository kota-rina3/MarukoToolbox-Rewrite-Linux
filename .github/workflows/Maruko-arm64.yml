name: Maruko-arm64

on:
  workflow_dispatch:
    branch: master

jobs:
  build:
    name: 编译构建
    runs-on: ubuntu-24.04-arm
    container: linuxdeepin/deepin:crimson-arm64-v1.6.0

    steps:
    - name: 检查代码
      uses: actions/checkout@v4

    - name: 安装 Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: 安装所需依赖
      run: |
        apt update
        apt install -y \
          tk8.6-dev \
          tcl8.6-dev \
          build-essential \
          ccache \
          patchelf

    - name: 安装 Python 模块
      run: |
        python -m pip config set global.index-url https://mirrors.aliyun.com/pypi/simple
        python -m pip install nuitka==4.0.8 zstandard urllib3 tkinterdnd2 --break-system-packages

    - name: 编译
      run: python -m nuitka --onefile --standalone --windows-console-mode=disable --show-progress --lto=yes --jobs=4 --enable-plugins=tk-inter --include-module=math --follow-imports --include-data-file='./hooks/pre_find_module_path/hook-tkinter.py'='./hooks/pre_find_module_path/hook-tkinter.py' ./main.py

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: Maruko-arm64
        path: ./
